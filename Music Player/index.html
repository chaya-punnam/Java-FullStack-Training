<html>
<head>
    <title>Music Player</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <img id="songimage" src="./IMAGES/image-1.jpg" alt="Album Image">
    <h2 id="songname">ABC SONG</h2>
    <h3 id="singername">ABC SINGER</h3>
    <div id="fixed">
        <div id="movable"></div>
    </div>
    <div id="time">
        <div id="currentTime">0:00</div>
        <div id="duration">0:00</div>
    </div>
    <br>
    <div id="icons">
        <i class="fa-solid fa-shuffle" id="shuffle"></i>
        <i class="fa-solid fa-backward" id="backward"></i>
        <i class="fa-solid fa-play" id="play"></i>
        <i class="fa-solid fa-forward" id="forward"></i>
        <i class="fa-solid fa-heart" id="heart"></i>
    </div>
    <audio id="audio" src="./AUDIO/music-1.mp3"></audio>
    <script src="app.js"></script>
</body>
</html>
